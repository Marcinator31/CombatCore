name: CombatCore
version: 1.0.0
main: de.combatcore.CombatCore
api-version: '1.21'
author: CombatCore
description: Combat tagging, anti-combat-log, safe-zone regions and configurable command/item blocking.

commands:
  combatcore:
    description: Main CombatCore command.
    usage: /combatcore <reload|status|tag|untag>
    aliases: [cc, combat]
  combatregion:
    description: Manage combat safe-zone regions.
    usage: /combatregion <pos1|pos2|create|delete|list>
    aliases: [cregion, creg]

permissions:
  combatcore.admin:
    description: Reload, tag/untag players, manage regions.
    default: op
  combatcore.bypass.commands:
    description: Use blocked commands while in combat.
    default: false
  combatcore.bypass.items:
    description: Use blocked items/elytra while in combat.
    default: false
  combatcore.bypass.regions:
    description: Enter protected regions while in combat.
    default: false
